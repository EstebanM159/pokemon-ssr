<div
  class="bg-blue-500/25 animate-fadeIn h-44 rounded-lg shadow-md flex flex-col items-center justify-center cursor-pointer p-4"
  [routerLink]="['/pokemon', pokemon()?.name]"
>
  <img
    [src]="pokemonUrlImage()"
    [alt]="[`Imagen de ${pokemon()?.name}`]"
    class="size-24"
    width="96px"
    height="96px"
  />
  <div class="text-center mt-2">
    <h2 class="text-xl font-bold capitalize text-white">{{ pokemon()?.name }}</h2>
  </div>
  <router-outlet />
</div>
