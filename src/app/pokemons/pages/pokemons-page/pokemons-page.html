<h1 class="text-3xl">Listado de pokemos</h1>
<h2 class="text-xl">Pagina actual: {{ this.currentPage() }}</h2>

<div class="flex justify-between">
  <button
    [routerLink]="['/pokemons/page', currentPage()! - 1]"
    [disabled]="currentPage() === 1"
    class="mt-2"
  >
    Anteriores
  </button>
  <button [routerLink]="['/pokemons/page', currentPage()! + 1]" class="mt-2">Siguientes</button>
</div>
<hr class="my-2" />
@if (pokemons().length !== 0) {
  <pokemon-list [pokemons]="pokemons()" />
} @else {
  <pokemons-list-skeleton />
}
